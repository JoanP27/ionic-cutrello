<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Nueva tarea</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
   <ion-grid>
    <ion-row>
      <ion-col class="ion-display-flex ion-justify-content-center ion-align-content-center ion-padding">
        <form class="login-form" [formRoot]="taskForm">
          <ion-list>
            <ion-item lines="none" class="ion-text-center">
              <h2>Añadir nueva tarea</h2>
            </ion-item>
            <ion-item lines="none">
              <ion-input 
                [formField]="taskForm.title"
                label="Titulo" 
                labelPlacement="floating" 
                placeholder="Titulo"
                name="title" 
                type="text" 
                id="title"
                [errorText]="taskForm.title().errors().length > 0 ? taskForm.title().errors()[0]?.message : ''"
              >
              </ion-input>
            </ion-item>
            <ion-item lines="none">
              <ion-textarea 
                [formField]="taskForm.description"
                label="Descripcion" 
                labelPlacement="floating" 
                placeholder="descripcion"
                name="description" 
                id="description"
                [errorText]="taskForm.description().errors().length > 0 ? taskForm.description().errors()[0]?.message : ''"
              >
              </ion-textarea>
            </ion-item>
            <ion-item lines="none">
              <ion-datetime-button datetime="datetime"></ion-datetime-button>
              <ion-modal [keepContentsMounted]="true">
                <ng-template>
                  <ion-datetime [formField]="taskForm.deadLine" id="datetime" presentation="date"></ion-datetime>
                </ng-template>
              </ion-modal>
            </ion-item>
            <ion-item lines="none">
              @for (error of taskForm.deadLine().errors(); track error.kind) {
                    <ion-label class="ion-no-margin" color="danger">{{error.message}}</ion-label>
                }
            </ion-item>
            <!--ion-item lines="none">
              <ion-button color="tertiary" (click)="pickFromGallery()">
                <ion-icon name="images" slot="start"></ion-icon>
                Gallery
              </ion-button>
            </ion-item-->
            <ion-item lines="none">
              <ion-button type="submit" color="primary" expand="block" [disabled]="this.taskForm().invalid()">
                Enviar
              </ion-button>
            </ion-item>
          
          </ion-list>
        </form>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
