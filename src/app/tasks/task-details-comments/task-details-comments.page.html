<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>task-details-comments</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="addComment()">
      <ion-icon name="add" ></ion-icon>
    </ion-fab-button>
  </ion-fab>
  <ion-list>
    <ion-list-header>
      <h1>Comentarios</h1>
    </ion-list-header>
    @for (comment of this.comments(); track $index) {
      <ion-item lines="none">
        <ion-avatar slot="start">
          <img [src]="comment.user.avatar" />
        </ion-avatar>
        <ion-label>
          <h1>{{comment.user.name}}</h1>
        </ion-label>
        <ion-label slot="end">
          <p>{{comment.createdAt  | date: 'dd/MM/yyyy hh:mm'}}</p>
        </ion-label>
      </ion-item>
      <ion-item>
        <p>{{comment.comment}}</p>   
      </ion-item>
    }
  </ion-list>
  <ion-infinite-scroll (ionInfinite)="onIonInfinite($event)">
    <ion-infinite-scroll-content></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
